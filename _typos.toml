[files]
extend-exclude = [
    "datasets/*",
    "docs/notebooks/example_answers/*",
]

[default.extend-words]
# UMBRELA is an acronym (paper: "UMBRELA: UMbrella Benchmark for Release Agents")
UMBRELA = "UMBRELA"
# "ba" appears in auto-generated Jupyter notebook cell IDs (e.g. "ba3ab816")
ba = "ba"
# "ttest" is the statistical paired t-test (scipy.stats.ttest_rel), not a typo
ttest = "ttest"
# "CPY" is the ruff rule prefix for flake8-copyright
CPY = "CPY"